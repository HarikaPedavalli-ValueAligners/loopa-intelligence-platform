services:
  loopa-api:
    build: .
    command: python api/server.py --host 0.0.0.0 --port 8787
    env_file:
      - .env
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
      - ./loopa_intelligence.db:/app/loopa_intelligence.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3

  loopa-scheduler:
    build: .
    command: python scheduler.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./loopa_intelligence.db:/app/loopa_intelligence.db
    profiles:
      - scheduler
